events {}

stream {
  resolver 127.0.0.11 valid=10s;

  upstream backend_udp_pool {
    zone backend_udp_pool 64k;
    least_conn;
    server backend-1:4000 resolve;
    server backend-2:4000 resolve;
    server backend-3:4000 resolve;
  }

  server {
    listen 4000 udp;
    proxy_pass backend_udp_pool;
  }
}

http {
  resolver 127.0.0.11 valid=10s;
  # Per-client request rate limit: ~10 req/sec with short burst allowance.
  limit_req_zone $binary_remote_addr zone=api_rate_limit:10m rate=10r/s;
  # Per-client concurrent connection limit for API/WS endpoints.
  limit_conn_zone $binary_remote_addr zone=api_conn_limit:10m;

  upstream backend_pool {
    zone backend_pool 64k;
    least_conn;
    server backend-1:3000 resolve;
    server backend-2:3000 resolve;
    server backend-3:3000 resolve;
  }

  server {
    listen 80;
    server_name _;
    client_max_body_size 20m;
    limit_req_status 429;

    location /api/ {
      limit_req zone=api_rate_limit burst=20 nodelay;
      limit_conn api_conn_limit 30;
      proxy_pass http://backend_pool/;
      proxy_http_version 1.1;
      proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
      proxy_next_upstream_tries 3;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
      limit_conn api_conn_limit 20;
      proxy_pass http://backend_pool;
      proxy_http_version 1.1;
      proxy_read_timeout 3600s;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      # 1. If someone hits the backend IP directly, send them to frontend server.
      return 302 http://16.171.174.26$request_uri;
    }
  }
}
