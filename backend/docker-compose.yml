services:
  mongo:
    image: mongo:7
    container_name: task_manager_backend_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-1: &backend-common
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      MONGO_URI: mongodb://mongo:27017/task_manager
    depends_on:
      mongo:
        condition: service_healthy
    command: sh -c "npm install && npm run dev"

  backend-2:
    <<: *backend-common

  backend-3:
    <<: *backend-common
  
  nginx:
    image: nginx:alpine
    container_name: task_manager_backend_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "4000:4000/udp"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-1
      - backend-2
      - backend-3

volumes:
  mongo_data:
