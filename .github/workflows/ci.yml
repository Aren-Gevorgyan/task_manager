# =============================================================================
# CI — Continuous Integration
# Runs on push / pull request to main branches: install deps, lint, test.
# =============================================================================
name: CI

# When this workflow runs: pushes and PRs targeting these branches only.
on:
  push:
    branches: [main, master, production]
  pull_request:
    branches: [main, master, production]

# Avoid duplicate runs for the same ref; cancel older runs when a new push arrives.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Node.js version used by all jobs (matches your Dockerfiles / local dev).
env:
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  # Frontend: ESLint + Vitest (fails the workflow if lint or tests fail).
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      # Clone this repository into the runner so we can read frontend/ files.
      - uses: actions/checkout@v4

      # Install Node and enable npm cache for faster repeat runs.
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Install exact dependency versions from package-lock.json (reproducible builds).
      - name: Install dependencies
        run: npm ci

      # Run ESLint across the frontend source (static analysis).
      - name: Lint
        run: npm run lint

      # Run Vitest unit tests once in CI (non-watch mode).
      - name: Test
        run: npm run test

  # ---------------------------------------------------------------------------
  # Backend: verify package-lock installs cleanly (no test script in package.json).
  # ---------------------------------------------------------------------------
  backend-install:
    name: Backend (install check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # Confirms dependencies resolve; catches broken lockfile or missing packages.
      - name: Install dependencies
        run: npm ci

  # ---------------------------------------------------------------------------
  # Telegram bot: same install sanity check as backend.
  # ---------------------------------------------------------------------------
  telegram-bot-install:
    name: Telegram bot (install check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: telegram-bot
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: telegram-bot/package-lock.json

      - name: Install dependencies
        run: npm ci
