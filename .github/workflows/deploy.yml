# =============================================================================
# CD — Build & push images to GitHub Container Registry (GHCR), then deploy
# over SSH (git pull + docker compose pull/up).
#
# Triggers:
#   • workflow_dispatch — manual run with checkboxes (same as before).
#   • push to branch production — full pipeline: build/push images + deploy both servers.
#
# Configure in GitHub: Settings → Secrets and variables → Actions
#
# Secrets (sensitive):
#   SSH_PRIVATE_KEY       — The *private* key (never the .pub file). Full PEM:
#                         -----BEGIN ... PRIVATE KEY----- through -----END ...----- 
#                         Multiline secret in GitHub is OK. If you see
#                         "ssh: no key found", the secret is wrong format, has extra
#                         quotes, or Windows CRLF only—re-paste with Unix line breaks.
#                         PuTTY .ppk must be converted: puttygen x.ppk -O private-openssh -o key.pem
#   SSH_USER              — Login on both servers (e.g. ubuntu, ec2-user)
#   BACKEND_HOST          — Backend server IP/DNS
#   FRONTEND_HOST         — Frontend server IP/DNS
# Optional:
#   SSH_PORT              — SSH port if not 22
#   GHCR_PULL_TOKEN       — Classic PAT with read:packages; used on servers for
#                             `docker login ghcr.io` when packages are private.
#   GHCR_PULL_USER        — Username for docker login (optional; defaults to github.actor)
#
# Variables (non-secret):
#   BACKEND_DEPLOY_PATH     — Absolute path to backend/ on the backend server
#   FRONTEND_DEPLOY_PATH    — Absolute path to repo root on the frontend server
#
# Hosts may use Secrets OR Variables (IPs are often stored as Variables):
#   BACKEND_HOST, FRONTEND_HOST — set at least one of secret or variable per host.
# If you use Environment "production", add the same secrets/vars there or deployment
# may see empty values (environment overrides repo-level settings).
#
# Manual workflow inputs (workflow_dispatch only):
#   publish_images, deploy_use_registry, deploy_backend, deploy_frontend
#
# Images (after publish):
#   ghcr.io/<lowercase owner/repo>/backend:latest
#   ghcr.io/<lowercase owner/repo>/frontend:latest
#   ghcr.io/<lowercase owner/repo>/telegram-bot:latest
# =============================================================================
name: Deploy

on:
  # Automatic deploy when commits land on production (after merge from PR or direct push).
  push:
    branches: [production]
  workflow_dispatch:
    inputs:
      publish_images:
        description: "Build in CI, log in to ghcr.io, push backend/frontend/telegram-bot images"
        type: boolean
        default: true
      deploy_use_registry:
        description: "On servers: docker login (if token set), pull images, up with docker-compose.registry.yml"
        type: boolean
        default: true
      deploy_backend:
        description: "SSH to backend server and update stack"
        type: boolean
        default: true
      deploy_frontend:
        description: "SSH to frontend server and update stack"
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Build/push when: manual with publish=true, OR push to production (always publish).
  # Job always completes so deploy jobs can `needs:` it.
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build and push images to GHCR
    if: >-
      ${{
        github.event_name == 'workflow_dispatch'
        || (github.event_name == 'push' && github.ref == 'refs/heads/production')
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute lowercase GHCR registry prefix
        id: registry
        run: |
          LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "prefix=ghcr.io/${LOWER}" >> "$GITHUB_OUTPUT"
          echo "REGISTRY_PREFIX=ghcr.io/${LOWER}" >> "$GITHUB_ENV"
          echo "Using registry prefix: ghcr.io/${LOWER}"

      # Publish images if: push to production, OR manual run with publish_images checked.
      - name: Log in to GitHub Container Registry
        if: >-
          ${{
            (github.event_name == 'push' && github.ref == 'refs/heads/production')
            || (github.event_name == 'workflow_dispatch' && inputs.publish_images)
          }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        if: >-
          ${{
            (github.event_name == 'push' && github.ref == 'refs/heads/production')
            || (github.event_name == 'workflow_dispatch' && inputs.publish_images)
          }}
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.registry.outputs.prefix }}/backend:latest
            ${{ steps.registry.outputs.prefix }}/backend:${{ github.sha }}

      - name: Build and push frontend image
        if: >-
          ${{
            (github.event_name == 'push' && github.ref == 'refs/heads/production')
            || (github.event_name == 'workflow_dispatch' && inputs.publish_images)
          }}
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.registry.outputs.prefix }}/frontend:latest
            ${{ steps.registry.outputs.prefix }}/frontend:${{ github.sha }}

      - name: Build and push telegram-bot image
        if: >-
          ${{
            (github.event_name == 'push' && github.ref == 'refs/heads/production')
            || (github.event_name == 'workflow_dispatch' && inputs.publish_images)
          }}
        uses: docker/build-push-action@v6
        with:
          context: ./telegram-bot
          file: ./telegram-bot/Dockerfile
          push: true
          tags: |
            ${{ steps.registry.outputs.prefix }}/telegram-bot:latest
            ${{ steps.registry.outputs.prefix }}/telegram-bot:${{ github.sha }}

      - name: Skip image publish (manual run only — servers may use docker compose --build)
        if: >-
          ${{ github.event_name == 'workflow_dispatch' && !inputs.publish_images }}
        run: |
          echo "publish_images=false — no images pushed; deploy will use on-server build if configured."

  # ---------------------------------------------------------------------------
  # Backend server
  # ---------------------------------------------------------------------------
  deploy-backend:
    name: Deploy backend
    needs: build-and-push
    if: >-
      ${{
        needs.build-and-push.result == 'success'
        && (
          (github.event_name == 'push' && github.ref == 'refs/heads/production')
          || (github.event_name == 'workflow_dispatch' && inputs.deploy_backend)
        )
      }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      # Fail fast with a clear message if host/user/key are missing (avoids drone-ssh "missing server host").
      - name: Verify backend SSH configuration and write key file
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "${{ secrets.BACKEND_HOST || vars.BACKEND_HOST }}" ]; then
            echo "::error::Set Secret or Variable BACKEND_HOST (e.g. 13.51.175.203). Repo → Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "${{ secrets.SSH_USER || vars.SSH_USER }}" ]; then
            echo "::error::Set Secret or Variable SSH_USER (e.g. ubuntu)."
            exit 1
          fi
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "::error::Set Secret SSH_PRIVATE_KEY (private key file contents, not .pub)."
            exit 1
          fi
          mkdir -p .gha-ssh
          printf '%s' "$SSH_PRIVATE_KEY" | tr -d '\r' > .gha-ssh/deploy_key.pem
          chmod 600 .gha-ssh/deploy_key.pem
          if ! ssh-keygen -y -f .gha-ssh/deploy_key.pem > /dev/null 2>&1; then
            echo "::error::SSH_PRIVATE_KEY is not a valid OpenSSH/PEM private key."
            echo "Use the file WITHOUT .pub; include BEGIN/END lines. Re-paste in GitHub (multiline). No PPK—convert with puttygen -O private-openssh."
            exit 1
          fi

      - name: SSH deploy backend
        uses: appleboy/ssh-action@v1.2.0
        env:
          REGISTRY_PREFIX: ghcr.io/${{ github.repository }}
          GHCR_USER: ${{ secrets.GHCR_PULL_USER != '' && secrets.GHCR_PULL_USER || github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          DEPLOY_USE_REGISTRY: >-
            ${{
              (github.event_name == 'push' && github.ref == 'refs/heads/production')
              || (github.event_name == 'workflow_dispatch' && inputs.deploy_use_registry)
            }}
          DID_PUBLISH: >-
            ${{
              (github.event_name == 'push' && github.ref == 'refs/heads/production')
              || (github.event_name == 'workflow_dispatch' && inputs.publish_images)
            }}
        with:
          host: ${{ secrets.BACKEND_HOST || vars.BACKEND_HOST }}
          username: ${{ secrets.SSH_USER || vars.SSH_USER }}
          key_path: .gha-ssh/deploy_key.pem
          port: ${{ secrets.SSH_PORT || vars.SSH_PORT || 22 }}
          script_stop: true
          envs: REGISTRY_PREFIX,GHCR_USER,GHCR_TOKEN,DEPLOY_USE_REGISTRY,DID_PUBLISH
          script: |
            set -euo pipefail
            REGISTRY_PREFIX=$(echo "$REGISTRY_PREFIX" | tr '[:upper:]' '[:lower:]')
            export REGISTRY_PREFIX
            cd "${{ vars.BACKEND_DEPLOY_PATH }}"
            git fetch origin
            git checkout "${{ github.ref_name }}"
            git pull origin "${{ github.ref_name }}"

            if [ -n "${GHCR_TOKEN:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            fi

            if [ "$DEPLOY_USE_REGISTRY" = "true" ] && [ "$DID_PUBLISH" = "true" ]; then
              docker compose -f docker-compose.yml -f docker-compose.registry.yml pull
              docker compose -f docker-compose.yml -f docker-compose.registry.yml up -d
            else
              docker compose -f docker-compose.yml up -d --build
            fi

  # ---------------------------------------------------------------------------
  # Frontend server
  # ---------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy frontend
    needs: build-and-push
    if: >-
      ${{
        needs.build-and-push.result == 'success'
        && (
          (github.event_name == 'push' && github.ref == 'refs/heads/production')
          || (github.event_name == 'workflow_dispatch' && inputs.deploy_frontend)
        )
      }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Verify frontend SSH configuration and write key file
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "${{ secrets.FRONTEND_HOST || vars.FRONTEND_HOST }}" ]; then
            echo "::error::Set Secret or Variable FRONTEND_HOST (e.g. 16.171.174.26)."
            exit 1
          fi
          if [ -z "${{ secrets.SSH_USER || vars.SSH_USER }}" ]; then
            echo "::error::Set Secret or Variable SSH_USER."
            exit 1
          fi
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "::error::Set Secret SSH_PRIVATE_KEY (private key, not .pub)."
            exit 1
          fi
          mkdir -p .gha-ssh
          printf '%s' "$SSH_PRIVATE_KEY" | tr -d '\r' > .gha-ssh/deploy_key.pem
          chmod 600 .gha-ssh/deploy_key.pem
          if ! ssh-keygen -y -f .gha-ssh/deploy_key.pem > /dev/null 2>&1; then
            echo "::error::SSH_PRIVATE_KEY is not a valid private key. Paste full PEM; not the .pub file."
            exit 1
          fi

      - name: SSH deploy frontend
        uses: appleboy/ssh-action@v1.2.0
        env:
          REGISTRY_PREFIX: ghcr.io/${{ github.repository }}
          GHCR_USER: ${{ secrets.GHCR_PULL_USER != '' && secrets.GHCR_PULL_USER || github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          DEPLOY_USE_REGISTRY: >-
            ${{
              (github.event_name == 'push' && github.ref == 'refs/heads/production')
              || (github.event_name == 'workflow_dispatch' && inputs.deploy_use_registry)
            }}
          DID_PUBLISH: >-
            ${{
              (github.event_name == 'push' && github.ref == 'refs/heads/production')
              || (github.event_name == 'workflow_dispatch' && inputs.publish_images)
            }}
        with:
          host: ${{ secrets.FRONTEND_HOST || vars.FRONTEND_HOST }}
          username: ${{ secrets.SSH_USER || vars.SSH_USER }}
          key_path: .gha-ssh/deploy_key.pem
          port: ${{ secrets.SSH_PORT || vars.SSH_PORT || 22 }}
          script_stop: true
          envs: REGISTRY_PREFIX,GHCR_USER,GHCR_TOKEN,DEPLOY_USE_REGISTRY,DID_PUBLISH
          script: |
            set -euo pipefail
            REGISTRY_PREFIX=$(echo "$REGISTRY_PREFIX" | tr '[:upper:]' '[:lower:]')
            export REGISTRY_PREFIX
            cd "${{ vars.FRONTEND_DEPLOY_PATH }}"
            git fetch origin
            git checkout "${{ github.ref_name }}"
            git pull origin "${{ github.ref_name }}"

            if [ -n "${GHCR_TOKEN:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            fi

            if [ "$DEPLOY_USE_REGISTRY" = "true" ] && [ "$DID_PUBLISH" = "true" ]; then
              docker compose -f docker-compose.yml -f docker-compose.registry.yml pull
              docker compose -f docker-compose.yml -f docker-compose.registry.yml up -d
            else
              docker compose -f docker-compose.yml up -d --build
            fi
