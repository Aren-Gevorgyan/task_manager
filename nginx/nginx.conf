events {
  # Use default event settings for lightweight local reverse proxying.
}

stream {
  # Docker DNS server for dynamic service discovery of backend UDP listeners.
  resolver 127.0.0.11 valid=10s;

  # Load-balance UDP datagrams across backend replicas.
  upstream backend_udp_pool {
    least_conn;
    server backend:4000 resolve;
  }

  server {
    # Public UDP entrypoint proxied to backend replicas.
    listen 4000 udp;
    proxy_pass backend_udp_pool;
  }
}

http {
  # Docker DNS server for dynamic service discovery of scaled backend containers.
  resolver 127.0.0.11 valid=10s;

  # Load-balance API and websocket requests across backend replicas.
  upstream backend_pool {
    least_conn;
    server backend:3000 resolve;
  }

  server {
    # Listen on container port 80; mapped to host port 80 in docker-compose.
    listen 80;
    # Local development host name served by this Nginx instance.
    server_name localhost;
    # Allow request bodies larger than Nginx default (1MB).
    client_max_body_size 20m;

    location / {
      # Forward frontend traffic to Vite dev server container.
      proxy_pass http://frontend:5173;
      # Keep HTTP/1.1 for stable dev-server and HMR behavior.
      proxy_http_version 1.1;
      # Preserve original host and client IP metadata.
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      # Forward proxy-chain information for debugging/tracing.
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      # Send API calls to backend and strip /api prefix via trailing slash.
      proxy_pass http://backend_pool/;
      # Keep HTTP/1.1 behavior aligned with backend expectations.
      proxy_http_version 1.1;
      # Retry another backend replica when one fails.
      proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
      proxy_next_upstream_tries 3;
      # Preserve original host and client IP metadata.
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      # Forward proxy-chain information for debugging/tracing.
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
      # Forward websocket endpoint to backend service.
      proxy_pass http://backend_pool;
      # HTTP/1.1 is required for websocket upgrade handshake.
      proxy_http_version 1.1;
      # These two headers enable protocol upgrade to websocket.
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      # Preserve original host and client IP metadata.
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      # Forward proxy-chain information for debugging/tracing.
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
