services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Inside Docker "backend" hostname does not exist; match nginx upstream for /api
      VITE_PROXY_TARGET: http://13.51.175.203
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    expose:
      - "5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  telegram-bot:
    build:
      context: ./telegram-bot
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./telegram-bot/.env

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/frontend-server.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend

volumes:
  frontend_node_modules:
